workflows:
  flutter-ios:
    name: Flutter iOS Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Flutter packages
        script: flutter pub get

      - name: CocoaPods install
        script: |
          cd ios
          pod repo update
          pod install
          cd ..

      - name: Build iOS app (release)
        script: |
          flutter build ios --release

    artifacts:
      - build/ios/iphoneos/*.app